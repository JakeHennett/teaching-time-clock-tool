<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Digital + Analog Clock</title>
<style>
    body {
        font-family: Arial, sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 40px;
        margin-top: 40px;
    }

    /* DIGITAL CLOCK */
    #digital {
        font-size: 64px;
        width: 300px;
        text-align: center;
        padding: 10px;
        border: 2px solid #333;
        border-radius: 8px;
    }

    /* ANALOG CLOCK */
    .clock {
        width: 300px;
        height: 300px;
        border: 8px solid #333;
        border-radius: 50%;
        position: relative;
    }

    .hand {
        position: absolute;
        width: 50%;
        height: 4px;
        background: black;
        top: 50%;
        left: 50%;
        transform-origin: 0% 50%;
    }

    .hour {
        height: 6px;
        width: 35%;
    }

    .minute {
        height: 4px;
        width: 45%;
    }

    /* Numbers around the clock (simple, explicit positions) */
    .number {
        position: absolute;
        width: 30px;
        height: 30px;
        text-align: center;
        line-height: 30px;
        font-size: 18px;
        font-weight: bold;
    }

    .n12 { top: 5px; left: 50%; transform: translateX(-50%); }
    .n1  { top: 25px; right: 70px; }
    .n2  { top: 65px; right: 30px; }
    .n3  { top: 50%; right: 5px; transform: translateY(-50%); }
    .n4  { bottom: 65px; right: 30px; }
    .n5  { bottom: 25px; right: 70px; }
    .n6  { bottom: 5px; left: 50%; transform: translateX(-50%); }
    .n7  { bottom: 25px; left: 70px; }
    .n8  { bottom: 65px; left: 30px; }
    .n9  { top: 50%; left: 5px; transform: translateY(-50%); }
    .n10 { top: 65px; left: 30px; }
    .n11 { top: 25px; left: 70px; }
</style>
</head>
<body>

<input id="digital" type="text" value="12:00" />

<div class="clock">
    <div id="hourHand" class="hand hour"></div>
    <div id="minuteHand" class="hand minute"></div>

    <!-- Clock numbers -->
    <div class="number n12">12</div>
    <div class="number n1">
