<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Digital + Analog Clock</title>
<style>
    body {
        font-family: Arial, sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 40px;
        margin-top: 40px;
    }

    /* DIGITAL CLOCK */
    #digital {
        font-size: 64px;
        width: 300px;
        text-align: center;
        padding: 10px;
        border: 2px solid #333;
        border-radius: 8px;
    }

    /* ANALOG CLOCK */
    .clock {
        width: 300px;
        height: 300px;
        border: 8px solid #333;
        border-radius: 50%;
        position: relative;
    }

    .hand {
        position: absolute;
        width: 50%;
        height: 4px;
        background: black;
        top: 50%;
        left: 50%;
        transform-origin: 0% 50%;
    }

    .hour {
        height: 6px;
        width: 35%;
    }

    .minute {
        height: 4px;
        width: 45%;
    }

    /* Numbers around the clock (simple, explicit positions) */
    .number {
        position: absolute;
        width: 30px;
        height: 30px;
        text-align: center;
        line-height: 30px;
        font-size: 18px;
        font-weight: bold;
    }

    .n12 { top: 5px; left: 50%; transform: translateX(-50%); }
    .n1  { top: 25px; right: 70px; }
    .n2  { top: 65px; right: 30px; }
    .n3  { top: 50%; right: 5px; transform: translateY(-50%); }
    .n4  { bottom: 65px; right: 30px; }
    .n5  { bottom: 25px; right: 70px; }
    .n6  { bottom: 5px; left: 50%; transform: translateX(-50%); }
    .n7  { bottom: 25px; left: 70px; }
    .n8  { bottom: 65px; left: 30px; }
    .n9  { top: 50%; left: 5px; transform: translateY(-50%); }
    .n10 { top: 65px; left: 30px; }
    .n11 { top: 25px; left: 70px; }
</style>
</head>
<body>

<input id="digital" type="text" value="12:00" />
<div class="clock">
    <div id="hourHand" class="hand hour"></div>
    <div id="minuteHand" class="hand minute"></div>

    <!-- Clock numbers -->
    <div class="number n12">12</div>
    <div class="number n1">1</div>
    <div class="number n2">2</div>
    <div class="number n3">3</div>
    <div class="number n4">4</div>
    <div class="number n5">5</div>
    <div class="number n6">6</div>
    <div class="number n7">7</div>
    <div class="number n8">8</div>
    <div class="number n9">9</div>
    <div class="number n10">10</div>
    <div class="number n11">11</div>
</div>

<script>
function updateAnalogClock(hours, minutes) {
    var hourDeg = (hours % 12) * 30 + minutes * 0.5;
    var minuteDeg = minutes * 6;

    document.getElementById("hourHand").style.transform =
        "rotate(" + (hourDeg - 90) + "deg)";
    document.getElementById("minuteHand").style.transform =
        "rotate(" + (minuteDeg - 90) + "deg)";
}

function parseDigitalInput() {
    var value = document.getElementById("digital").value;
    var parts = value.split(":");

    var h = parseInt(parts[0], 10) || 0;
    var m = parseInt(parts[1], 10) || 0;

    updateAnalogClock(h, m);
}

document.getElementById("digital").addEventListener("input", parseDigitalInput);

// Initialize on page load
parseDigitalInput();

</script>
